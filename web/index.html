<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meeting AI — Anna App</title>
  <style>
    :root { --bg:#0b0b12; --panel:#15151f; --line:#2a2a38; --txt:#e8e9ee; --muted:#9a9cab; --blue:#3b82f6; --green:#10b981; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--txt); font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 28px 20px 60px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
    .status { display:inline-block; font-size:12px; font-weight:600; padding:4px 10px; border-radius:999px; border:1px solid var(--line); }
    .status.live { color:#86efac; border-color:rgba(16,185,129,.4); background:rgba(16,185,129,.1); }
    .status.mock { color:#fbbf24; border-color:rgba(251,191,36,.35); background:rgba(251,191,36,.08); }
    textarea { width:100%; height:150px; background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:10px; padding:12px; font:13px/1.5 ui-monospace,monospace; resize:vertical; }
    .row { display:flex; gap:10px; align-items:center; margin:12px 0 22px; }
    button { background:var(--blue); color:#fff; border:0; border-radius:8px; padding:10px 18px; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin:10px 0; }
    .q { color:#93c5fd; font-weight:600; }
    .a { margin-top:6px; white-space:pre-wrap; }
    .label { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:6px; }
    .pill { font-size:11px; color:var(--muted); }
    pre { white-space:pre-wrap; margin:0; font:12px/1.5 ui-monospace,monospace; color:#cbd5e1; }
    code { color:#93c5fd; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Meeting AI <span style="color:var(--muted)">on Anna</span></h1>
    <div class="sub">A static page becomes AI-native at the first call — <code>anna.llm.complete()</code>. No key, no backend.</div>
    <div><span id="status" class="status">connecting…</span></div>

    <p class="label" style="margin-top:22px">Meeting transcript</p>
    <textarea id="transcript"></textarea>
    <div class="row">
      <button id="run">Detect → Answer → Summarize</button>
      <span class="pill" id="hint"></span>
    </div>

    <div id="out"></div>
  </div>

  <script type="module" src="./app.mjs"></script>
</body>
</html>
