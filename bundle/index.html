<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meeting AI</title>
  <style>
    :root { --bg:#0b0b12; --panel:#15151f; --line:#2a2a38; --txt:#e8e9ee; --muted:#9a9cab; --blue:#3b82f6; }
    * { box-sizing:border-box; } html,body { margin:0; height:100%; }
    body { background:var(--bg); color:var(--txt); font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
    .wrap { max-width:820px; margin:0 auto; padding:22px 18px 60px; }
    h1 { font-size:20px; margin:0 0 2px; }
    .sub { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .status { display:inline-block; font-size:12px; font-weight:600; padding:4px 10px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
    .status.live { color:#86efac; border-color:rgba(16,185,129,.4); background:rgba(16,185,129,.1); }
    .status.err  { color:#fca5a5; border-color:rgba(239,68,68,.4); background:rgba(239,68,68,.1); }
    textarea { width:100%; height:150px; margin-top:14px; background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:10px; padding:12px; font:13px/1.5 ui-monospace,monospace; resize:vertical; }
    .row { display:flex; gap:10px; align-items:center; margin:12px 0 18px; }
    button { background:var(--blue); color:#fff; border:0; border-radius:8px; padding:10px 18px; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin:10px 0; }
    .q { color:#93c5fd; font-weight:600; } .a { margin-top:6px; white-space:pre-wrap; }
    .label { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:6px; }
    pre { white-space:pre-wrap; margin:0; font:12px/1.5 ui-monospace,monospace; color:#cbd5e1; }
    code { color:#93c5fd; }
    button.ghost { background:#374151; }
    input[type=text] { flex:1; background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:10px 12px; font:14px sans-serif; }
    ul { margin:4px 0 0; padding-left:18px; } li { margin:2px 0; }
    .muted { color:var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Meeting AI <span style="color:var(--muted)">on Anna</span></h1>
    <div class="sub">Detect questions → answer → summarize, via <code>anna.llm.complete()</code>. No API key.</div>
    <div><span id="status" class="status">connecting…</span></div>
    <textarea id="transcript" placeholder="Click 🎤 Listen and speak, or paste a meeting transcript here…"></textarea>
    <div class="row">
      <button id="mic" class="ghost">🎤 Listen</button>
      <button id="run">Process transcript</button>
      <button id="summarize" class="ghost">Summarize</button>
      <button id="history" class="ghost">History</button>
      <button id="min" class="ghost">Minimize</button>
      <button id="clear" class="ghost">Clear</button>
      <span class="status" id="micStatus" style="display:none"></span>
    </div>
    <div class="row">
      <span class="muted" style="font-size:12px">Export:</span>
      <button id="saveTxt" class="ghost">.txt</button>
      <button id="saveDoc" class="ghost">.doc</button>
      <button id="savePdf" class="ghost">PDF</button>
      <button id="email" class="ghost">Email</button>
      <button id="share" class="ghost">Share</button>
    </div>
    <div class="row">
      <input id="askInput" type="text" placeholder="Ask Meeting AI a question…" />
      <button id="ask">Ask</button>
    </div>
    <div id="historyPanel" style="display:none"></div>
    <div id="out"></div>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
